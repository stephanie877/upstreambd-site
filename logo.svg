<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f6ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c9fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Arrow icon -->
  <g transform="translate(0, 10)">
    <rect x="4" y="20" width="4" height="16" rx="2" fill="url(#grad)" opacity="0.5"/>
    <rect x="12" y="12" width="4" height="24" rx="2" fill="url(#grad)" opacity="0.7"/>
    <rect x="20" y="4" width="4" height="32" rx="2" fill="url(#grad)"/>
    <!-- Arrow head -->
    <polygon points="22,0 14,10 30,10" fill="url(#grad)"/>
  </g>
  <!-- Text -->
  <text x="42" y="26" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="-0.5" fill="#f0f0f5">UPSTREAM</text>
  <text x="42" y="44" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" letter-spacing="3" fill="#4f6ef7">BD</text>
</svg>
